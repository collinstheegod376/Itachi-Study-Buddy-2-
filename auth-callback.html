<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Authenticating...</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    body {
      background: #111319;
      color: #e2e2eb;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .loader {
      border: 4px solid rgba(196, 192, 255, 0.1);
      border-top: 4px solid #c4c0ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="loader"></div>
    <h2 style="font-weight: 900; letter-spacing: 1px;">AUTHENTICATING...</h2>
    <p style="color: #c7c4d8; font-size: 14px; margin-top: 8px;">Please wait while we set up your session.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    async function handleAuthCallback() {
      // Wait for Auth to be initialized
      let retries = 0;
      while ((!window.Auth || !window.ProfileAPI) && retries < 50) {
        await new Promise(r => setTimeout(r, 100));
        retries++;
      }

      try {
        const { data: { session }, error } = await window._supabase.auth.getSession();
        if (error || !session) {
          window.location.replace('login.html');
          return;
        }

        const profile = await ProfileAPI.get(session.user.id);
        if (profile && profile.onboarding_complete) {
          window.location.replace('dashboard.html');
        } else {
          window.location.replace('onboarding.html');
        }
      } catch (err) {
        console.error('Callback error:', err);
        window.location.replace('login.html');
      }
    }

    window.addEventListener('load', handleAuthCallback);
  </script>
</body>

</html>
